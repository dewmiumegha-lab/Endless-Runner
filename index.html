<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>DASH — Endless Runner</title>
<link rel="manifest" href="manifest.json"/>
<meta name="theme-color" content="#A855F7"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="DASH"/>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg:        #F0E6FF;
  --surface:   #E8D5FF;
  --card:      #FFFFFF;
  --border:    rgba(180,130,255,0.25);
  --neon:      #A855F7;
  --neon2:     #F43F8E;
  --gold:      #F59E0B;
  --purple:    #8B5CF6;
  --green:     #10B981;
  --pink:      #EC4899;
}
* { box-sizing: border-box; margin: 0; padding: 0; user-select: none; -webkit-user-select: none; }
body {
  background: var(--bg);
  font-family: 'Inter', sans-serif;
  overflow: hidden;
  position: fixed;
  width: 100vw;
  height: 100vh;
}
#app {
  position: relative;
  width: 100%;
  height: 100%;
  max-width: 480px;
  margin: 0 auto;
  background: #000;
  box-shadow: 0 0 40px rgba(139,92,246,0.3);
}

/* ══ SCREEN MANAGEMENT ══ */
.screen {
  position: absolute;
  top: 0; left: 0; width: 100%; height: 100%;
  display: none;
  flex-direction: column;
  padding: 24px;
  z-index: 10;
}
.screen.active { display: flex; }

/* ══ BACKGROUND VIDEO / CANVAS AREA ══ */
#canvasWrapper {
  position: absolute;
  top: 0; left: 0; width: 100%; height: 100%;
  z-index: 1;
}
canvas { width: 100%; height: 100%; display: block; }

/* ══ HOME SCREEN ══ */
#scrHome {
  background: linear-gradient(135deg, #FAF5FF 0%, #E8D5FF 100%);
  justify-content: space-between;
  align-items: center;
  text-align: center;
}
.brand-area { margin-top: auto; }
.logo-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 84px;
  line-height: 0.85;
  background: linear-gradient(135deg, var(--neon), var(--neon2));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  letter-spacing: 2px;
  transform: italic;
}
.logo-sub {
  font-size: 14px;
  font-weight: 800;
  color: var(--purple);
  text-transform: uppercase;
  letter-spacing: 6px;
  margin-top: 8px;
}
.menu-buttons {
  width: 100%;
  display: flex;
  flex-direction: column;
  gap: 14px;
  margin-top: 40px;
  margin-bottom: auto;
}
.btn {
  background: var(--card);
  border: 2px solid var(--border);
  padding: 16px 28px;
  border-radius: 16px;
  font-weight: 800;
  font-size: 16px;
  color: #1e1b4b;
  letter-spacing: 0.5px;
  cursor: pointer;
  box-shadow: 0 8px 0 var(--surface);
  transform: translateY(-4px);
  transition: all 0.1s ease;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
}
.btn:active {
  transform: translateY(0px);
  box-shadow: 0 0px 0 var(--surface);
}
.btn-main {
  background: linear-gradient(135deg, var(--neon), var(--purple));
  color: white;
  border: none;
  box-shadow: 0 8px 0 #6d28d9;
}
.btn-main:active { box-shadow: 0 0px 0 #6d28d9; }

/* ══ SHOP SCREEN ══ */
#scrShop {
  background: #FAF5FF;
  z-index: 20;
}
.shop-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 20px;
}
.shop-title { font-family: 'Bebas Neue', sans-serif; font-size: 36px; color: var(--purple); }
.currency-display {
  background: var(--surface);
  padding: 6px 14px;
  border-radius: 20px;
  font-weight: 800;
  color: var(--gold);
}
.shop-tabs {
  display: flex;
  gap: 8px;
  margin-bottom: 16px;
}
.tab-btn {
  flex: 1;
  padding: 10px;
  border-radius: 12px;
  border: none;
  background: var(--surface);
  font-weight: 700;
  font-size: 13px;
  color: var(--purple);
  cursor: pointer;
}
.tab-btn.active {
  background: var(--neon);
  color: white;
}
.shop-grid {
  flex: 1;
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 12px;
  overflow-y: auto;
  padding-bottom: 20px;
}
.shop-item {
  background: white;
  border: 2px solid var(--border);
  border-radius: 16px;
  padding: 12px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: space-between;
  text-align: center;
  aspect-ratio: 1 / 1; /* Forces the shop items to be exact squares */
}
.item-ico { font-size: 32px; margin-bottom: 4px; }
.item-nm { font-weight: 800; font-size: 13px; color: #1e1b4b; margin-bottom: 2px; }
.item-pr { font-weight: 700; font-size: 12px; color: var(--gold); margin-bottom: 8px; }
.btn-buy {
  width: 100%;
  padding: 6px;
  font-size: 11px;
  font-weight: 800;
  border-radius: 8px;
  border: none;
  cursor: pointer;
}

/* ══ HUD (GAME PLAY) ══ */
#hud {
  position: absolute;
  top: 0; left: 0; width: 100%;
  padding: 20px;
  z-index: 5;
  display: flex;
  justify-content: space-between;
  pointer-events: none;
}
.hud-box {
  background: rgba(255, 255, 255, 0.85);
  backdrop-filter: blur(8px);
  border: 1px solid rgba(255,255,255,0.4);
  padding: 8px 16px;
  border-radius: 16px;
  font-weight: 900;
  font-size: 15px;
  color: #1e1b4b;
  display: flex;
  align-items: center;
  gap: 6px;
  box-shadow: 0 4px 12px rgba(139,92,246,0.1);
}
#hudRight { display: flex; gap: 8px; pointer-events: auto; }
.btn-pause { width: 36px; height: 36px; border-radius: 12px; padding: 0; box-shadow: 0 4px 0 var(--surface); transform: translateY(-2px); }

/* ══ OVERLAYS (PAUSE & GAME OVER) ══ */
.overlay {
  position: absolute;
  top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(26, 21, 44, 0.85);
  backdrop-filter: blur(12px);
  z-index: 30;
  display: none;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  padding: 32px;
}
.overlay-card {
  background: white;
  width: 100%;
  max-width: 360px;
  border-radius: 28px;
  padding: 32px 24px;
  text-align: center;
  box-shadow: 0 20px 40px rgba(0,0,0,0.4);
}
.overlay-title { font-family: 'Bebas Neue', sans-serif; font-size: 48px; margin-bottom: 20px; }
#popPause .overlay-title { color: var(--purple); }
#popGameOver .overlay-title { color: var(--neon2); }
.stats-group {
  background: var(--bg);
  border-radius: 18px;
  padding: 16px;
  margin-bottom: 24px;
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.stat-row { display: flex; justify-content: space-between; font-weight: 700; color: #1e1b4b; }
.stat-val { font-weight: 900; color: var(--purple); }

/* ══ TOAST NOTIFICATION ══ */
#toast {
  position: absolute;
  bottom: 30px; left: 50%;
  transform: translateX(-50%) translateY(100px);
  background: #1e1b4b;
  color: white;
  padding: 12px 24px;
  border-radius: 20px;
  font-weight: 700;
  font-size: 14px;
  z-index: 100;
  transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  pointer-events: none;
  white-space: nowrap;
}
#toast.show { transform: translateX(-50%) translateY(0); }

/* ══ LEADERBOARD ══ */
.lb-list { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; margin-bottom: 16px; }
.lb-row { display: flex; align-items: center; background: white; padding: 12px; border-radius: 14px; border: 1px solid var(--border); }
.lb-row.lb-you { background: var(--surface); border-color: var(--neon); }
.lb-rank { font-weight: 900; width: 30px; color: var(--purple); }
.lb-ava { margin-right: 12px; font-size: 20px; }
.lb-info { flex: 1; text-align: left; }
.lb-info-name { font-weight: 800; size: 14px; }
.lb-info-sub { font-size: 11px; color: var(--neon); font-weight: 600; }
.lb-score { font-weight: 900; color: #1e1b4b; }
</style>
</head>
<body>

<div id="app">
  <div id="canvasWrapper">
    <canvas id="gameCanvas"></canvas>
  </div>

  <div id="hud" style="display:none;">
    <div class="hud-box">🏃 <span id="hudDist">0m</span></div>
    <div id="hudRight">
      <div class="hud-box" style="color:var(--gold);">🪙 <span id="hudCoins">0</span></div>
      <button class="btn btn-pause" onclick="pauseGame()">⏸️</button>
    </div>
  </div>

  <div id="scrHome" class="screen active">
    <div class="brand-area">
      <div class="logo-title">DASH</div>
      <div class="logo-sub">Endless Runner</div>
    </div>
    <div class="menu-buttons">
      <button class="btn btn-main" onclick="startGame()">⚡ PLAY NOW</button>
      <button class="btn" onclick="openShop()">🛍️ ITEM SHOP</button>
      <button class="btn" onclick="openLB()">🏆 LEADERBOARD</button>
    </div>
  </div>

  <div id="scrShop" class="screen">
    <div class="shop-header">
      <div class="shop-title">ITEM SHOP</div>
      <div class="currency-display">🪙 <span id="shopCoins">0</span></div>
    </div>
    <div class="shop-tabs">
      <button class="tab-btn active" onclick="switchTab('skin')">Skins</button>
      <button class="tab-btn" onclick="switchTab('gear')">Gear</button>
    </div>
    <div id="shopGrid" class="shop-grid"></div>
    <button class="btn" onclick="closeShop()">⬅️ BACK TO MENU</button>
  </div>

  <div id="scrLB" class="screen" style="background:#FAF5FF; z-index:20;">
    <div class="shop-header">
      <div class="shop-title">LEADERBOARD</div>
    </div>
    <div id="lbList" class="lb-list"></div>
    <button class="btn" onclick="closeLB()">⬅️ BACK TO MENU</button>
  </div>

  <div id="popPause" class="overlay">
    <div class="overlay-card">
      <div class="overlay-title">PAUSED</div>
      <div class="menu-buttons" style="margin:0; gap:12px;">
        <button class="btn btn-main" onclick="resumeGame
